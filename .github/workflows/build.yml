name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 20: Electron's postinstall (which fetches the binary that
          # electron-builder packages) is reliable here, unlike Node 22.
          node-version: 20
          cache: npm

      # `npm install` (not `npm ci`): the committed lockfile is generated on
      # Windows and omits a few Linux-only optional deps, which fails the
      # stricter `npm ci` on the Linux runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
